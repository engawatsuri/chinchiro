<!DOCTYPE html>

<html>

<head>
    <meta charset="utf-8">
    <title>チンチロ電車</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        #win {
            background-color: steelblue;
            touch-action: none;
        }

        #msg {
            appearance: none;
            -webkit-appearance: none;
            background-color: burlywood;
            color: black;
            font-family: 'Meiryo UI';
            border-color: chocolate;
            opacity: 0.5;
            text-align: left;
        }

        .page {
            display: none;
        }

        .active {
            display: block;
        }

        #player0 {
            background-color: blue;
            box-sizing: border-box;
        }

        #player1 {
            background-color: red;
            box-sizing: border-box;
        }

        #player2 {
            background-color: yellow;
            box-sizing: border-box;
        }

        #player3 {
            background-color: green;
            box-sizing: border-box;
        }

        .btn {
            font-family: 'Meiryo UI';
            background-color: lightgray;
            color: black;
            text-align: left;
        }

        .selected {
            filter: invert(1);
        }

        /* 横長のディスプレイ */
        @media (min-aspect-ratio: 4/3) {
            #win {
                position: absolute;
                left: calc((100vw - (100dvh * 4 / 3)) / 2);
                top: 0;
                width: calc(100dvh * 4 / 3);
                height: 100dvh;
            }

            #msg {
                position: absolute;
                left: calc((100vw - (100dvh * 4 / 3)) / 2 + (100dvh * 4 / 3 * 0.1));
                top: 60dvh;
                width: calc(100dvh * 3.2 / 3);
                height: 30dvh;
                font-size: 5dvh;
                border-width: 1dvh;
            }

            .pos0 {
                position: absolute;
                left: calc((100vw - (100dvh * 4 / 3)) / 2 + (100dvh * 4 / 3 * 0.1));
                top: 10dvh;
                width: calc(100dvh * 4 / 3 * 0.5);
                height: 10dvh;
                font-size: 5dvh;
            }

            .pos1 {
                position: absolute;
                left: calc((100vw - (100dvh * 4 / 3)) / 2 + (100dvh * 4 / 3 * 0.1));
                top: 22dvh;
                width: calc(100dvh * 4 / 3 * 0.5);
                height: 10dvh;
                font-size: 5dvh;
            }

            .pos2 {
                position: absolute;
                left: calc((100vw - (100dvh * 4 / 3)) / 2 + (100dvh * 4 / 3 * 0.1));
                top: 34dvh;
                width: calc(100dvh * 4 / 3 * 0.5);
                height: 10dvh;
                font-size: 5dvh;
            }

            .pos3 {
                position: absolute;
                left: calc((100vw - (100dvh * 4 / 3)) / 2 + (100dvh * 4 / 3 * 0.1));
                top: 46dvh;
                width: calc(100dvh * 4 / 3 * 0.5);
                height: 10dvh;
                font-size: 5dvh;
            }

            #start0 {
                position: absolute;
                left: calc((100vw - (100dvh * 4 / 3)) / 2 + (100dvh * 2/22));
                top: calc(100dvh * 11/22);
                width: calc(100dvh * 5/22);
                height: calc(100dvh * 1/11);
                font-size: calc(100dvh * 1/22);
            }

            #start1 {
                position: absolute;
                left: calc((100vw - (100dvh * 4 / 3)) / 2 + (100dvh * 2/22));
                top: calc(100dvh * 13/22);
                width: calc(100dvh * 5/22);
                height: calc(100dvh * 1/11);
                font-size: calc(100dvh * 1/22);
            }

            #start2 {
                position: absolute;
                left: calc((100vw - (100dvh * 4 / 3)) / 2 + (100dvh * 2/22));
                top: calc(100dvh * 15/22);
                width: calc(100dvh * 5/22);
                height: calc(100dvh * 1/11);
                font-size: calc(100dvh * 1/22);
            }

            #start3 {
                position: absolute;
                left: calc((100vw - (100dvh * 4 / 3)) / 2 + (100dvh * 2/22));
                top: calc(100dvh * 17/22);
                width: calc(100dvh * 5/22);
                height: calc(100dvh * 1/11);
                font-size: calc(100dvh * 1/22);
            }

            #start4 {
                position: absolute;
                left: calc((100vw - (100dvh * 4 / 3)) / 2 + (100dvh * 2/22));
                top: calc(100dvh * 19/22);
                width: calc(100dvh * 5/22);
                height: calc(100dvh * 1/11);
                font-size: calc(100dvh * 1/22);
            }

            #movement_n {
                position: absolute;
                left: calc(100vw - (100vw - (100dvh * 4 / 3)) / 2 - (100dvh * 7/22));
                top: calc(100dvh * 13/22);
                width: calc(100dvh * 5/22);
                height: calc(100dvh * 1/11);
                font-size: calc(100dvh * 1/22);
            }

            #movement_e {
                position: absolute;
                left: calc(100vw - (100vw - (100dvh * 4 / 3)) / 2 - (100dvh * 7/22));
                top: calc(100dvh * 15/22);
                width: calc(100dvh * 5/22);
                height: calc(100dvh * 1/11);
                font-size: calc(100dvh * 1/22);
            }

            #movement_s {
                position: absolute;
                left: calc(100vw - (100vw - (100dvh * 4 / 3)) / 2 - (100dvh * 7/22));
                top: calc(100dvh * 17/22);
                width: calc(100dvh * 5/22);
                height: calc(100dvh * 1/11);
                font-size: calc(100dvh * 1/22);
            }

            #movement_w {
                position: absolute;
                left: calc(100vw - (100vw - (100dvh * 4 / 3)) / 2 - (100dvh * 7/22));
                top: calc(100dvh * 19/22);
                width: calc(100dvh * 5/22);
                height: calc(100dvh * 1/11);
                font-size: calc(100dvh * 1/22);
            }
        }

        /* 縦長のディスプレイ */
        @media (max-aspect-ratio: 4/3) {
            #win {
                position: absolute;
                left: 0;
                top: calc((100dvh - (100vw * 3 / 4)) / 2);
                width: 100vw;
                height: calc(100vw * 3 / 4);
            }

            #msg {
                position: absolute;
                left: 10vw;
                top: calc((100dvh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.6));
                width: 80vw;
                height: calc(100vw * 3 / 4 * 0.3);
                font-size: calc(100vw * 3 / 4 * 0.05);
                border-width: calc(100vw * 3 / 4 * 0.01);
            }

            .pos0 {
                position: absolute;
                left: 10vw;
                top: calc((100dvh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.1));
                width: 50vw;
                height: calc(100vw * 3 / 4 * 0.1);
                font-size: calc(100vw * 3/4 * 0.05);
            }

            .pos1 {
                position: absolute;
                left: 10vw;
                top: calc((100dvh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.22));
                width: 50vw;
                height: calc(100vw * 3 / 4 * 0.1);
                font-size: calc(100vw * 3/4 * 0.05);
            }

            .pos2 {
                position: absolute;
                left: 10vw;
                top: calc((100dvh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.34));
                width: 50vw;
                height: calc(100vw * 3 / 4 * 0.1);
                font-size: calc(100vw * 3/4 * 0.05);
            }

            .pos3 {
                position: absolute;
                left: 10vw;
                top: calc((100dvh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.46));
                width: 50vw;
                height: calc(100vw * 3 / 4 * 0.1);
                font-size: calc(100vw * 3/4 * 0.05);
            }

            #start0 {
                position: absolute;
                left: calc(100vw * 3/4 * 1/11);
                top: calc((100dvh - (100vw * 3/4)) / 2 + (100vw * 3/4 * 11/22));
                width: calc(100vw * 3/4 * 5/22);
                height: calc(100vw * 3/4 * 1/11);
                font-size: calc(100vw * 3/4 * 1/22);
            }

            #start1 {
                position: absolute;
                left: calc(100vw * 3/4 * 1/11);
                top: calc((100dvh - (100vw * 3/4)) / 2 + (100vw * 3/4 * 13/22));
                width: calc(100vw * 3/4 * 5/22);
                height: calc(100vw * 3/4 * 1/11);
                font-size: calc(100vw * 3/4 * 1/22);
            }

            #start2 {
                position: absolute;
                left: calc(100vw * 3/4 * 1/11);
                top: calc((100dvh - (100vw * 3/4)) / 2 + (100vw * 3/4 * 15/22));
                width: calc(100vw * 3/4 * 5/22);
                height: calc(100vw * 3/4 * 1/11);
                font-size: calc(100vw * 3/4 * 1/22);
            }

            #start3 {
                position: absolute;
                left: calc(100vw * 3/4 * 1/11);
                top: calc((100dvh - (100vw * 3/4)) / 2 + (100vw * 3/4 * 17/22));
                width: calc(100vw * 3/4 * 5/22);
                height: calc(100vw * 3/4 * 1/11);
                font-size: calc(100vw * 3/4 * 1/22);
            }

            #start4 {
                position: absolute;
                left: calc(100vw * 3/4 * 1/11);
                top: calc((100dvh - (100vw * 3/4)) / 2 + (100vw * 3/4 * 19/22));
                width: calc(100vw * 3/4 * 5/22);
                height: calc(100vw * 3/4 * 1/11);
                font-size: calc(100vw * 3/4 * 1/22);
            }

            #movement_n {
                position: absolute;
                left: calc(100vw - (100vw * 3/4 * 7/22));
                top: calc((100dvh - (100vw * 3/4)) / 2 + (100vw * 3/4 * 13/22));
                width: calc(100vw * 3/4 * 5/22);
                height: calc(100vw * 3/4 * 1/11);
                font-size: calc(100vw * 3/4 * 1/22);
            }

            #movement_e {
                position: absolute;
                left: calc(100vw - (100vw * 3/4 * 7/22));
                top: calc((100dvh - (100vw * 3/4)) / 2 + (100vw * 3/4 * 15/22));
                width: calc(100vw * 3/4 * 5/22);
                height: calc(100vw * 3/4 * 1/11);
                font-size: calc(100vw * 3/4 * 1/22);
            }

            #movement_s {
                position: absolute;
                left: calc(100vw - (100vw * 3/4 * 7/22));
                top: calc((100dvh - (100vw * 3/4)) / 2 + (100vw * 3/4 * 17/22));
                width: calc(100vw * 3/4 * 5/22);
                height: calc(100vw * 3/4 * 1/11);
                font-size: calc(100vw * 3/4 * 1/22);
            }

            #movement_w {
                position: absolute;
                left: calc(100vw - (100vw * 3/4 * 7/22));
                top: calc((100dvh - (100vw * 3/4)) / 2 + (100vw * 3/4 * 19/22));
                width: calc(100vw * 3/4 * 5/22);
                height: calc(100vw * 3/4 * 1/11);
                font-size: calc(100vw * 3/4 * 1/22);
            }
        }
    </style>
</head>

<body>
    <canvas id="win"></canvas>
    <btn id="msg" onclick="keydown('Enter')"></btn>
    <div id="home" class="page active">
        <button id="home0" class="btn pos0">つづきから</button>
        <button id="home1" class="btn pos1" onclick="change_page('create1')">はじめから</button>
        <button id="home2" class="btn pos2">設定</button>
        <button id="home3" class="btn pos3">遊び方</button>
    </div>
    <div id="create0" class="page">
        <input id="player0" class="pos0" type="text" maxlength="4">
        <input id="player1" class="pos1" type="text" maxlength="4">
        <input id="player2" class="pos2" type="text" maxlength="4">
        <input id="player3" class="pos3" type="text" maxlength="4">
    </div>
    <div id="create1" class="page"></div>
    <div id="setting_goal" class="page"></div>
    <div id="start" class="page">
        <button id="start0" class="btn" onclick="change_page('dice')">サイコロ</button>
        <button id="start1" class="btn" onclick="">カード</button>
        <button id="start2" class="btn" onclick="">アイテム</button>
        <button id="start3" class="btn" onclick="">探索</button>
        <button id="start4" class="btn" onclick="">その他</button>
    </div>
    <div id="movement" class="page">
        <button id="movement_n" class="btn" onclick="keydown('h')">西</button>
        <button id="movement_e" class="btn" onclick="keydown('j')">南</button>
        <button id="movement_s" class="btn" onclick="keydown('k')">北</button>
        <button id="movement_w" class="btn" onclick="keydown('l')">東</button>
    </div>
    <div id="dice" class="page"></div>
    <div id="card" class="page"></div>
    <div id="item" class="page"></div>
    <div id="search" class="page"></div>
    <div id="other" class="page"></div>
    <div id="arrival" class="page"></div>
    <div id="arrival_goal" class="page">
    <div id="station_ai" class="page"></div>
    <div id="station_ca" class="page"></div>
    <div id="station_du" class="page"></div>
    <div id="station_he" class="page"></div>
    <div id="station_ka" class="page"></div>
    <div id="station_lo" class="page"></div>
    <div id="station_mi" class="page"></div>
    <div id="station_ni" class="page"></div>
    <div id="station_pl" class="page"></div>
    <div id="station_pr" class="page"></div>
    <div id="station_sh" class="page"></div>
    <div id="station_to" class="page"></div>
    <div id="station_wh" class="page"></div>
    <script type="module">
        import init_wasm, {
            resize_win,
            change_page,
        } from "./pkg/frontend.js";

        async function initFrontend() {
            await init_wasm();
        }

        function keydown(key) {
            window.onkeydown(new KeyboardEvent("keydown", {
                key: key
            }));
        }

        window.change_page = change_page;
        window.keydown = keydown;

        function preventScroll(e) {
            e.preventDefault();
        }

        window.addEventListener('load', async () => {
            document.addEventListener('touchmove', preventScroll, { passive: false });
            document.addEventListener('wheel', preventScroll, { passive: false });
            await initFrontend();

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    resize_win();
                    change_page('home');
                });
            });
        });

        window.addEventListener('resize', resize_win);
    </script>
</body>

</html>

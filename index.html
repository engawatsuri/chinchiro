<!DOCTYPE html>

<html>

<head>
    <meta charset="utf-8">
    <title>チンチロ電鉄</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        #win {
            background-color: steelblue;
            touch-action: none;
        }

        #msg {
            appearance: none;
            -webkit-appearance: none;
            background-color: burlywood;
            border-width: 1px;
            border-color: burlywood;
            opacity: 0.5;
        }

        .page {
            display: none;
        }

        .active {
            display: block;
        }

        #home0,
        #home1,
        #home2,
        #home3,
        #start0,
        #start1,
        #start2,
        #start3,
        #start4,
        #other0,
        #movement_n,
        #movement_e,
        #movement_s,
        #movement_w {
            background-color: lightgray;
            color: black;
        }

        .selected {
            filter: invert(1);
        }

        /* 横長のディスプレイ */
        @media (min-aspect-ratio: 4/3) {
            #win {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2);
                top: 0;
                width: calc(100vh * 4 / 3);
                height: 100vh;
            }

            #msg {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 4 / 3 * 0.1));
                top: 60vh;
                width: calc(100vh * 3.2 / 3);
                height: 30vh;
            }

            #home0 {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 4 / 3 * 0.1));
                top: 10vh;
                width: calc(100vh * 4 / 3 * 0.5);
                height: 10vh;
            }

            #home1 {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 4 / 3 * 0.1));
                top: 22vh;
                width: calc(100vh * 4 / 3 * 0.5);
                height: 10vh;
            }

            #home2 {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 4 / 3 * 0.1));
                top: 34vh;
                width: calc(100vh * 4 / 3 * 0.5);
                height: 10vh;
            }

            #home3 {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 4 / 3 * 0.1));
                top: 46vh;
                width: calc(100vh * 4 / 3 * 0.5);
                height: 10vh;
            }

            #yourPlayer {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 4 / 3 * 0.7));
                top: 46vh;
                width: calc(100vh * 4 / 3 * 0.2);
                height: 10vh;
            }

            #start0 {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 2/22));
                top: calc(100vh * 11/22);
                width: calc(100vh * 5/22);
                height: calc(100vh * 1/11);
            }

            #start1 {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 2/22));
                top: calc(100vh * 13/22);
                width: calc(100vh * 5/22);
                height: calc(100vh * 1/11);
            }

            #start2 {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 2/22));
                top: calc(100vh * 15/22);
                width: calc(100vh * 5/22);
                height: calc(100vh * 1/11);
            }

            #start3 {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 2/22));
                top: calc(100vh * 17/22);
                width: calc(100vh * 5/22);
                height: calc(100vh * 1/11);
            }

            #start4 {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 2/22));
                top: calc(100vh * 19/22);
                width: calc(100vh * 5/22);
                height: calc(100vh * 1/11);
            }

            #other0 {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 2/22));
                top: calc(100vh * 19/22);
                width: calc(100vh * 5/22);
                height: calc(100vh * 1/11);
            }

            #movement_n {
                position: absolute;
                left: calc(100vw - (100vw - (100vh * 4 / 3)) / 2 - (100vh * 7/22));
                top: calc(100vh * 13/22);
                width: calc(100vh * 5/22);
                height: calc(100vh * 1/11);
            }

            #movement_e {
                position: absolute;
                left: calc(100vw - (100vw - (100vh * 4 / 3)) / 2 - (100vh * 7/22));
                top: calc(100vh * 15/22);
                width: calc(100vh * 5/22);
                height: calc(100vh * 1/11);
            }

            #movement_s {
                position: absolute;
                left: calc(100vw - (100vw - (100vh * 4 / 3)) / 2 - (100vh * 7/22));
                top: calc(100vh * 17/22);
                width: calc(100vh * 5/22);
                height: calc(100vh * 1/11);
            }

            #movement_w {
                position: absolute;
                left: calc(100vw - (100vw - (100vh * 4 / 3)) / 2 - (100vh * 7/22));
                top: calc(100vh * 19/22);
                width: calc(100vh * 5/22);
                height: calc(100vh * 1/11);
            }
        }

        /* 縦長のディスプレイ */
        @media (max-aspect-ratio: 4/3) {
            #win {
                position: absolute;
                left: 0;
                top: calc((100vh - (100vw * 3 / 4)) / 2);
                width: 100vw;
                height: calc(100vw * 3 / 4);
            }

            #msg {
                position: absolute;
                left: 10vw;
                top: calc((100vh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.6));
                width: 80vw;
                height: calc(100vw * 3 / 4 * 0.3);
            }

            #home0 {
                position: absolute;
                left: 10vw;
                top: calc((100vh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.1));
                width: 50vw;
                height: calc(100vw * 3 / 4 * 0.1);
            }

            #home1 {
                position: absolute;
                left: 10vw;
                top: calc((100vh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.22));
                width: 50vw;
                height: calc(100vw * 3 / 4 * 0.1);
            }

            #home2 {
                position: absolute;
                left: 10vw;
                top: calc((100vh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.34));
                width: 50vw;
                height: calc(100vw * 3 / 4 * 0.1);
            }

            #home3 {
                position: absolute;
                left: 10vw;
                top: calc((100vh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.46));
                width: 50vw;
                height: calc(100vw * 3 / 4 * 0.1);
            }

            #yourPlayer {
                position: absolute;
                left: 70vw;
                top: calc((100vh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.46));
                width: 20vw;
                height: calc(100vw * 3 / 4 * 0.1);
            }

            #start0 {
                position: absolute;
                left: calc(100vw * 3/4 * 1/11);
                top: calc((100vh - (100vw * 3/4)) / 2 + (100vw * 3/4 * 11/22));
                width: calc(100vw * 3/4 * 5/22);
                height: calc(100vw * 3/4 * 1/11);
            }

            #start1 {
                position: absolute;
                left: calc(100vw * 3/4 * 1/11);
                top: calc((100vh - (100vw * 3/4)) / 2 + (100vw * 3/4 * 13/22));
                width: calc(100vw * 3/4 * 5/22);
                height: calc(100vw * 3/4 * 1/11);
            }

            #start2 {
                position: absolute;
                left: calc(100vw * 3/4 * 1/11);
                top: calc((100vh - (100vw * 3/4)) / 2 + (100vw * 3/4 * 15/22));
                width: calc(100vw * 3/4 * 5/22);
                height: calc(100vw * 3/4 * 1/11);
            }

            #start3 {
                position: absolute;
                left: calc(100vw * 3/4 * 1/11);
                top: calc((100vh - (100vw * 3/4)) / 2 + (100vw * 3/4 * 17/22));
                width: calc(100vw * 3/4 * 5/22);
                height: calc(100vw * 3/4 * 1/11);
            }

            #start4 {
                position: absolute;
                left: calc(100vw * 3/4 * 1/11);
                top: calc((100vh - (100vw * 3/4)) / 2 + (100vw * 3/4 * 19/22));
                width: calc(100vw * 3/4 * 5/22);
                height: calc(100vw * 3/4 * 1/11);
            }

            #other0 {
                position: absolute;
                left: calc(100vw * 3/4 * 1/11);
                top: calc((100vh - (100vw * 3/4)) / 2 + (100vw * 3/4 * 19/22));
                width: calc(100vw * 3/4 * 5/22);
                height: calc(100vw * 3/4 * 1/11);
            }

            #movement_n {
                position: absolute;
                left: calc(100vw - (100vw * 3/4 * 7/22));
                top: calc((100vh - (100vw * 3/4)) / 2 + (100vw * 3/4 * 13/22));
                width: calc(100vw * 3/4 * 5/22);
                height: calc(100vw * 3/4 * 1/11);
            }

            #movement_e {
                position: absolute;
                left: calc(100vw - (100vw * 3/4 * 7/22));
                top: calc((100vh - (100vw * 3/4)) / 2 + (100vw * 3/4 * 15/22));
                width: calc(100vw * 3/4 * 5/22);
                height: calc(100vw * 3/4 * 1/11);
            }

            #movement_s {
                position: absolute;
                left: calc(100vw - (100vw * 3/4 * 7/22));
                top: calc((100vh - (100vw * 3/4)) / 2 + (100vw * 3/4 * 17/22));
                width: calc(100vw * 3/4 * 5/22);
                height: calc(100vw * 3/4 * 1/11);
            }

            #movement_w {
                position: absolute;
                left: calc(100vw - (100vw * 3/4 * 7/22));
                top: calc((100vh - (100vw * 3/4)) / 2 + (100vw * 3/4 * 19/22));
                width: calc(100vw * 3/4 * 5/22);
                height: calc(100vw * 3/4 * 1/11);
            }
        }
    </style>
    <link rel="stylesheet" href="create.css">
</head>

<body>
    <canvas id="win"></canvas>
    <btn id="msg" onclick="keydown('Enter')"></btn>
    <div id="home" class="page active">
        <button id="home0">つづきから</button>
        <button id="home1" onclick="changePage('create1')">はじめから</button>
        <button id="home2">設定</button>
        <button id="home3">遊び方</button>
    </div>
    <div id="create1" class="page">
        <input id="player1" type="text" maxlength="6">
        <input id="player2" type="text" maxlength="6">
        <input id="player3" type="text" maxlength="6">
        <input id="player4" type="text" maxlength="6">
    </div>
    <div id="create2" class="page"></div>
    <div id="start" class="page">
        <button id="start0" onclick="changePage('dice')">サイコロ</button>
        <button id="start1" onclick="changePage('card')">カード</button>
        <button id="start2" onclick="changePage('item')">アイテム</button>
        <button id="start3" onclick="changePage('search')">探索</button>
        <button id="start4" onclick="changePage('other')">その他</button>
    </div>
    <div id="movement" class="page">
        <button id="movement_n" onclick="keydown('h')">西</button>
        <button id="movement_e" onclick="keydown('j')">南</button>
        <button id="movement_s" onclick="keydown('k')">北</button>
        <button id="movement_w" onclick="keydown('l')">東</button>
    </div>
    <div id="dice" class="page"></div>
    <div id="card" class="page">
        <button id="card0" onclick=""></button>
    </div>
    <div id="item" class="page"></div>
    <div id="search" class="page"></div>
    <div id="other" class="page">
        <button id="other0" onclick="next_start()">スキップ</button>
    </div>
    <div id="property_station" class="page"></div>
    <div id="blue_station" class="page"></div>
    <div id="card_station" class="page"></div>
    <div id="red_station" class="page"></div>
    <script type="module">
        import init_wasm, {
            draw_map,
            move_train,
            add_player,
            roll,
            next_turn,
            get_cards,
            stop_property_station, stop_blue_station, stop_card_station, stop_red_station,
        } from "./pkg/frontend.js";

        const win = document.getElementById('win');
        const ctx = win.getContext('2d');
        const msg = document.getElementById('msg');
        let page = 'home';
        let selected = 0;
        let selected_range = 0;
        let initialized = false;
        let movement_result;
        
        async function initFrontend() {
            await init_wasm();
        }

        function next_start(key) {
            next_turn();
            changePage('start');
        }

        function keydown(key) {
            window.onkeydown(new KeyboardEvent("keydown", {
                key: key
            }));
        }

        function btn_sys(key) {
            let new_selected;
            switch(key) {
                case 'Enter': {
                    let btn = document.getElementById(`${page}${selected}`);
                    btn.classList.remove("selected");
                    btn.onclick();
                    return;
                }
                case 'J': {
                    new_selected = selected_range - 1;
                    break;
                }
                case 'j': {
                    new_selected = (selected + 1) % selected_range;
                    break;
                }
                case 'K': {
                    new_selected = 0;
                    break;
                }
                case 'k': {
                    new_selected = (selected + -1 + selected_range) % selected_range;
                    break;
                }
                default: {
                    return;
                }
            }
            if(initialized) {
                let btn = document.getElementById(`${page}${selected}`);
                btn.classList.remove("selected");
            } else {
                initialized = true;
            }
            selected = new_selected;
            let btn = document.getElementById(`${page}${selected}`);
            btn.classList.add("selected");
        }

        function init() {
            switch (page) {
                case 'start': {
                    initialized = false;
                    selected_range = 5;
                    msg.textContent = "";
                    window.onkeydown = (e) => {
                        btn_sys(e.key);
                    };
                    btn_sys('K');
                    msg.style.display = 'none';
                    break;
                }
                case 'movement': {
                    window.onkeydown = (e) => {
                        console.log("keydown", e.key, e.repeat);

                        switch(e.key) {
                            case 'h': {
                                movement_result = move_train('w');
                                break;
                            }
                            case 'j': {
                                movement_result = move_train('s');
                                break;
                            }
                            case 'k': {
                                movement_result = move_train('n');
                                break;
                            }
                            case 'l': {
                                movement_result = move_train('e');
                                break;
                            }
                            default: {
                                return;
                            }
                        }
                        draw();
                        if(movement_result == "property") {
                            changePage('property_station');
                        } else if(movement_result == "blue") {
                            changePage('blue_station');
                        } else if(movement_result == "card") {
                            changePage('card_station');
                        } else if(movement_result == "red") {
                            changePage('red_station');
                        } else {
                            msg.textContent = `残り${movement_result}マス`;
                        }
                    };
                    break;
                }
                case 'dice': {
                    msg.style.display = 'block';
                    msg.textContent = `${roll()}マス進めます`;
                    changePage('movement');
                    break;
                }
                case 'card': {
                    msg.style.display = 'block';
                    const cards = get_cards();
                    if(cards.length == 0) {
                        msg.textContent = 'カードは一枚も持っていません';
                        window.onkeydown = (e) => {
                            switch(e.key) {
                                case 'Enter': {
                                    next_turn();
                                    changePage('start');
                                    break;
                                }
                            }
                        };
                    } else {
                        msg.textContent = `カードを${cards.length}枚も持っています`;
                        window.onkeydown = (e) => {
                            switch(e.key) {
                                case 'Enter': {
                                    next_turn();
                                    changePage('start');
                                    break;
                                }
                            }
                        };
                    }
                    break;
                }
                case 'item': {
                    msg.textContent = "まだこのページは完成していません";
                    window.onkeydown = (e) => {
                        switch(e.key) {
                            case 'Escape': {
                                changePage('start');
                            }
                        }
                    };
                    break;
                }
                case 'search': {
                    msg.textContent = "まだこのページは完成していません";
                    window.onkeydown = (e) => {
                        switch(e.key) {
                            case 'Escape': {
                                changePage('start');
                            }
                        }
                    };
                    break;
                }
                case 'other': {
                    initialized = false;
                    selected_range = 1;
                    btn_sys('K');
                    window.onkeydown = (e) => {
                        btn_sys(e.key);
                    };
                    break;
                }
                case 'property_station': {
                    msg.textContent = `${stop_property_station()}駅に止まりました`;
                    window.onkeydown = (e) => {
                        switch(e.key) {
                            case 'Enter': {
                                next_turn();
                                changePage('start');
                                break;
                            }
                            case 'Escape': {
                                break;
                            }
                        }
                    };
                    break;
                }
                case 'blue_station': {
                    msg.textContent = `${stop_blue_station()}万円手に入りました`;
                    window.onkeydown = (e) => {
                        switch(e.key) {
                            case 'Enter': {
                                next_turn();
                                changePage('start');
                                break;
                            }
                            case 'Escape': {
                                break;
                            }
                        }
                    };
                    break;
                }
                case 'card_station': {
                    msg.textContent = `${stop_card_station()}カードを手に入れた`;
                    window.onkeydown = (e) => {
                        switch(e.key) {
                            case 'Enter': {
                                next_turn();
                                changePage('start');
                                break;
                            }
                            case 'Escape': {
                                break;
                            }
                        }
                    };
                    break;
                }
                case 'red_station': {
                    msg.textContent = `${stop_red_station()}万円失いました`;
                    window.onkeydown = (e) => {
                        switch(e.key) {
                            case 'Enter': {
                                next_turn();
                                changePage('start');
                                break;
                            }
                            case 'Escape': {
                                break;
                            }
                        }
                    };
                    break;
                }
                case 'home': {
                    initialized = false;
                    selected_range = 4;
                    btn_sys('K');
                    msg.textContent = "桃太郎電鉄(えんがわ釣り・作)へようこそ";
                    window.onkeydown = (e) => {
                        btn_sys(e.key);
                    };
                    break;
                }
                case 'create1': {
                    msg.textContent = "社長さんの名前とあなたの汽車を設定してください";
                    window.onkeydown = (e) => {
                        switch(e.key) {
                            case 'Enter':
                                const player1 = document.getElementById('player1');
                                const player2 = document.getElementById('player2');
                                const player3 = document.getElementById('player3');
                                const player4 = document.getElementById('player4');
                                if(player1.value != "") {
                                    add_player(player1.value);
                                    if(player2.value != "") {
                                        add_player(player2.value);
                                        if(player3.value != "") {
                                            add_player(player3.value);
                                            if(player4.value != "") {
                                                add_player(player4.value);
                                            }
                                        }
                                    }
                                    changePage('create2');
                                }
                                break;
                            case 'Escape':
                                changePage('home');
                                break;
                        }
                    };
                    break;
                }
                case 'create2': {
                    msg.textContent = "本作の目標はお金を集めることではありません。様々な事象でポイントを集めることです。その事象の中には、総資産が少なくないと発生しないものもあります。まずは100ポイントを目指して頑張ってください";
                    window.onkeydown = (e) => {
                        switch(e.key) {
                            case 'Enter':
                                changePage('start');
                                break;
                            case 'Escape':
                                changePage('create1');
                                break;
                        }
                    };
                    break;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, win.width, win.height);
            switch (page) {
                case 'start': {
                    draw_map();
                    break;
                }
                case 'movement': {
                    draw_map();
                    break;
                }
                case 'dice':
                case 'card':
                case 'item':
                case 'search':
                case 'other': {
                    draw_map();
                    break;
                }
                case 'property_station':
                case 'blue_station':
                case 'card_station':
                case 'red_station': {
                    draw_map();
                    break;
                }
                case 'home': {
                    break;
                }
                case 'create1': {
                    break;
                }
                case 'create2': {
                    draw_map();
                    break;
                }
            }
        }

        function changePage(pageId) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            page = pageId;
            init();
            draw();
        }

        globalThis.changePage = changePage;
        globalThis.keydown = keydown;

        function preventScroll(e) {
            e.preventDefault();
        }

        function resizeWin() {
            const dpr = window.devicePixelRatio || 1;
            const rect = win.getBoundingClientRect();
            win.width = Math.round(rect.width * dpr);
            win.height = Math.round(rect.height * dpr);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            draw();
        }

        window.addEventListener('load', async () => {
            document.addEventListener('touchmove', preventScroll, { passive: false });
            document.addEventListener('wheel', preventScroll, { passive: false });
            await initFrontend();
            changePage('home');
            resizeWin();
        });

        window.addEventListener('resize', () => {
            resizeWin();
        });

    </script>
</body>

</html>

<!DOCTYPE html>

<html>

<head>
    <meta charset="utf-8">
    <title>チンチロ電鉄</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        #win {
            background-color: steelblue;
            touch-action: none;
        }

        #msg {
            appearance: none;
            -webkit-appearance: none;
            background-color: burlywood;
            border-width: 1px;
            border-color: burlywood;
            opacity: 0.5;
        }

        #back,
        #next {
            opacity: 0;
        }

        .page {
            display: none;
        }

        .active {
            display: block;
        }

        /* 横長のディスプレイ */
        @media (min-aspect-ratio: 4/3) {
            #win {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2);
                top: 0;
                width: calc(100vh * 4 / 3);
                height: 100vh;
            }

            #msg {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 4 / 3 * 0.1));
                top: 60vh;
                width: calc(100vh * 3.2 / 3);
                height: 30vh;
            }

            #back {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 4 / 3 * 0.1));
                top: 60vh;
                width: calc(100vh * 1.6 / 3);
                height: 30vh;
            }

            #next {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 0.4 / 3) + (100vh * 1.6 / 3));
                top: 60vh;
                width: calc(100vh * 1.6 / 3);
                height: 30vh;
            }

            #home1 {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 4 / 3 * 0.1));
                top: 10vh;
                width: calc(100vh * 4 / 3 * 0.5);
                height: 10vh;
            }

            #home2 {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 4 / 3 * 0.1));
                top: 22vh;
                width: calc(100vh * 4 / 3 * 0.5);
                height: 10vh;
            }

            #home3 {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 4 / 3 * 0.1));
                top: 34vh;
                width: calc(100vh * 4 / 3 * 0.5);
                height: 10vh;
            }

            #home4 {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 4 / 3 * 0.1));
                top: 46vh;
                width: calc(100vh * 4 / 3 * 0.5);
                height: 10vh;
            }

            #yourPlayer {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 4 / 3 * 0.7));
                top: 46vh;
                width: calc(100vh * 4 / 3 * 0.2);
                height: 10vh;
            }

            #dice {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 2/22));
                top: calc(100vh * 13/22);
                width: calc(100vh * 5/22);
                height: calc(100vh * 1/11);
            }

            #card {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 2/22));
                top: calc(100vh * 15/22);
                width: calc(100vh * 5/22);
                height: calc(100vh * 1/11);
            }

            #search {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 2/22));
                top: calc(100vh * 17/22);
                width: calc(100vh * 5/22);
                height: calc(100vh * 1/11);
            }

            #other {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 2/22));
                top: calc(100vh * 19/22);
                width: calc(100vh * 5/22);
                height: calc(100vh * 1/11);
            }
        }

        /* 縦長のディスプレイ */
        @media (max-aspect-ratio: 4/3) {
            #win {
                position: absolute;
                left: 0;
                top: calc((100vh - (100vw * 3 / 4)) / 2);
                width: 100vw;
                height: calc(100vw * 3 / 4);
            }

            #msg {
                position: absolute;
                left: 10vw;
                top: calc((100vh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.6));
                width: 80vw;
                height: calc(100vw * 3 / 4 * 0.3);
            }

            #back {
                position: absolute;
                left: 10vw;
                top: calc((100vh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.6));
                width: 40vw;
                height: calc(100vw * 3 / 4 * 0.3);
            }

            #next {
                position: absolute;
                left: 50vw;
                top: calc((100vh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.6));
                width: 40vw;
                height: calc(100vw * 3 / 4 * 0.3);
            }

            #home1 {
                position: absolute;
                left: 10vw;
                top: calc((100vh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.1));
                width: 50vw;
                height: calc(100vw * 3 / 4 * 0.1);
            }

            #home2 {
                position: absolute;
                left: 10vw;
                top: calc((100vh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.22));
                width: 50vw;
                height: calc(100vw * 3 / 4 * 0.1);
            }

            #home3 {
                position: absolute;
                left: 10vw;
                top: calc((100vh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.34));
                width: 50vw;
                height: calc(100vw * 3 / 4 * 0.1);
            }

            #home4 {
                position: absolute;
                left: 10vw;
                top: calc((100vh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.46));
                width: 50vw;
                height: calc(100vw * 3 / 4 * 0.1);
            }

            #yourPlayer {
                position: absolute;
                left: 70vw;
                top: calc((100vh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.46));
                width: 20vw;
                height: calc(100vw * 3 / 4 * 0.1);
            }

            #dice {
                position: absolute;
                left: calc(100vw * 3/4 * 1/11);
                top: calc((100vh - (100vw * 3/4)) / 2 + (100vw * 3/4 * 13/22));
                width: calc(100vw * 3/4 * 5/22);
                height: calc(100vw * 3/4 * 1/11);
            }

            #card {
                position: absolute;
                left: calc(100vw * 3/4 * 1/11);
                top: calc((100vh - (100vw * 3/4)) / 2 + (100vw * 3/4 * 15/22));
                width: calc(100vw * 3/4 * 5/22);
                height: calc(100vw * 3/4 * 1/11);
            }

            #search {
                position: absolute;
                left: calc(100vw * 3/4 * 1/11);
                top: calc((100vh - (100vw * 3/4)) / 2 + (100vw * 3/4 * 17/22));
                width: calc(100vw * 3/4 * 5/22);
                height: calc(100vw * 3/4 * 1/11);
            }

            #other {
                position: absolute;
                left: calc(100vw * 3/4 * 1/11);
                top: calc((100vh - (100vw * 3/4)) / 2 + (100vw * 3/4 * 19/22));
                width: calc(100vw * 3/4 * 5/22);
                height: calc(100vw * 3/4 * 1/11);
            }
        }
    </style>
    <link rel="stylesheet" href="create.css">
</head>

<body>
    <canvas id="win"></canvas>
    <p id="msg"></p>
    <button id="back"></button>
    <button id="next"></button>
    <div id="home" class="page active">
        <button id="home1">つづきから</button>
        <button id="home2" onclick="changePage('create1')">はじめから</button>
        <button id="home3">設定</button>
        <button id="home4">遊び方</button>
    </div>
    <div id="create1" class="page">
        <input id="player1" type="text" maxlength="6">
        <input id="player2" type="text" maxlength="6">
        <input id="player3" type="text" maxlength="6">
        <input id="player4" type="text" maxlength="6">
    </div>
    <div id="create2" class="page"></div>
    <div id="apr" class="page"></div>
    <div id="may" class="page"></div>
    <div id="jun" class="page"></div>
    <div id="jul" class="page"></div>
    <div id="aug" class="page"></div>
    <div id="sep" class="page"></div>
    <div id="oct" class="page"></div>
    <div id="nov" class="page"></div>
    <div id="dec" class="page"></div>
    <div id="jan" class="page"></div>
    <div id="feb" class="page"></div>
    <div id="mar" class="page"></div>
    <div id="start" class="page">
        <button id="dice" onclick="changePage('dice')">サイコロ</button>
        <button id="card" onclick="changePage('card')">カード</button>
        <button id="search" onclick="changePage('search')">探索</button>
        <button id="other" onclick="changePage('other')">その他</button>
    </div>
    <div id="dice" class="page"></div>
    <div id="card" class="page"></div>
    <div id="search" class="page"></div>
    <div id="other" class="page"></div>
    <script type="module">
        import init_wasm, {
            draw_map,
            Player, add_player, get_player
        } from "./pkg/frontend.js";
        
        const win = document.getElementById('win');
        const ctx = win.getContext('2d');
        const msg = document.getElementById('msg');
        const back = document.getElementById('back');
        const next = document.getElementById('next');
        let initialized = false;
        let page = 'home';
        let turn = 0;
        
        async function initFrontend() {
            await init_wasm();
        }
    </script>
    <script src="month.js"></script>
    <script>
        function init() {
            switch (page) {
                case 'home':
                    msg.textContent = "桃太郎電鉄(えんがわ釣り・作)へようこそ";
                    back.onclick = () => {
                    };
                    next.onclick = () => {
                    };
                    break;
                case 'create1':
                    msg.textContent = "社長さんの名前とあなたの汽車を設定してください";
                    back.onclick = () => {
                        changePage('home');
                    };
                    next.onclick = () => {
                        const player1 = document.getElementById('player1');
                        const player2 = document.getElementById('player2');
                        const player3 = document.getElementById('player3');
                        const player4 = document.getElementById('player4');
                        if(player1.value != "") {
                            add_player(player1.value);
                            if(player2.value != "") {
                                add_player(player2.value);
                                if(player3.value != "") {
                                    add_player(player3.value);
                                    if(player4.value != "") {
                                        add_player(player4.value);
                                    }
                                }
                            }
                            changePage('create2');
                        }
                    };
                    break;
                case 'create2':
                    msg.textContent = "本作の目標はお金を集めることではありません。様々な事象でポイントを集めることです。その事象の中には、総資産が少なくないと発生しないものもあります。まずは100ポイントを目指して頑張ってください";
                    back.onclick = () => {
                        changePage('create1');
                    };
                    next.onclick = () => {
                        changePage('spr');
                    };
                    break;
                case 'start':
                    msg.textContent = "";
                    back.onclick = () => {};
                    next.onclick = () => {};
                    msg.style.display = 'block';
                    back.style.display = 'block';
                    next.style.display = 'block';
                    break;
                default:
                    init_month();
                    break;
            }
        }

        function draw() {
            switch (page) {
                case 'home':
                    break;
                case 'create1':
                    break;
                case 'create2':
                    draw_map(0, 0);
                    break;
                case 'start:
                    let player = get_player(turn);
                    draw_map(player.get_x(), player.get_y());
                    break;
                default:
                    draw_month();
            }
        }

        function changePage(pageId) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            page = pageId;
            init();
            draw();
        }

        function preventScroll(e) {
            e.preventDefault();
        }

        function resizeWin() {
            const dpr = window.devicePixelRatio || 1;
            const rect = win.getBoundingClientRect();
            win.width = Math.round(rect.width * dpr);
            win.height = Math.round(rect.height * dpr);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            draw();
        }

        window.addEventListener('load', () => {
            document.addEventListener('touchmove', preventScroll, { passive: false });
            document.addEventListener('wheel', preventScroll, { passive: false });
            changePage('home');
            resizeWin();
            initFrontend();
        });

        window.addEventListener('resize', () => {
            resizeWin();
        });

    </script>
</body>

</html>

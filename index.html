<!DOCTYPE html>

<html>

<head>
    <meta charset="utf-8">
    <title>チンチロ電鉄</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        #win {
            background-color: steelblue;
            touch-action: none;
        }

        #msg {
            appearance: none;
            -webkit-appearance: none;
            background-color: burlywood;
            border-width: 1px;
            border-color: burlywood;
            opacity: 0.5;
        }

        #back,
        #next {
            opacity: 0;
        }

        .page {
            display: none;
        }

        .active {
            display: block;
        }

        /* 横長のディスプレイ */
        @media (min-aspect-ratio: 4/3) {
            #win {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2);
                top: 0;
                width: calc(100vh * 4 / 3);
                height: 100vh;
            }

            #msg {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 4 / 3 * 0.1));
                top: 60vh;
                width: calc(100vh * 3.2 / 3);
                height: 30vh;
            }

            #back {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 4 / 3 * 0.1));
                top: 60vh;
                width: calc(100vh * 1.6 / 3);
                height: 30vh;
            }

            #next {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 0.4 / 3) + (100vh * 1.6 / 3));
                top: 60vh;
                width: calc(100vh * 1.6 / 3);
                height: 30vh;
            }

            #home1 {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 4 / 3 * 0.1));
                top: 10vh;
                width: calc(100vh * 4 / 3 * 0.5);
                height: 10vh;
            }

            #home2 {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 4 / 3 * 0.1));
                top: 22vh;
                width: calc(100vh * 4 / 3 * 0.5);
                height: 10vh;
            }

            #home3 {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 4 / 3 * 0.1));
                top: 34vh;
                width: calc(100vh * 4 / 3 * 0.5);
                height: 10vh;
            }

            #home4 {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 4 / 3 * 0.1));
                top: 46vh;
                width: calc(100vh * 4 / 3 * 0.5);
                height: 10vh;
            }

            #yourPlayer {
                position: absolute;
                left: calc((100vw - (100vh * 4 / 3)) / 2 + (100vh * 4 / 3 * 0.7));
                top: 46vh;
                width: calc(100vh * 4 / 3 * 0.2);
                height: 10vh;
            }
        }

        /* 縦長のディスプレイ */
        @media (max-aspect-ratio: 4/3) {
            #win {
                position: absolute;
                left: 0;
                top: calc((100vh - (100vw * 3 / 4)) / 2);
                width: 100vw;
                height: calc(100vw * 3 / 4);
            }

            #msg {
                position: absolute;
                left: 10vw;
                top: calc((100vh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.6));
                width: 80vw;
                height: calc(100vw * 3 / 4 * 0.3);
            }

            #back {
                position: absolute;
                left: 10vw;
                top: calc((100vh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.6));
                width: 40vw;
                height: calc(100vw * 3 / 4 * 0.3);
            }

            #next {
                position: absolute;
                left: 50vw;
                top: calc((100vh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.6));
                width: 40vw;
                height: calc(100vw * 3 / 4 * 0.3);
            }

            #home1 {
                position: absolute;
                left: 10vw;
                top: calc((100vh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.1));
                width: 50vw;
                height: calc(100vw * 3 / 4 * 0.1);
            }

            #home2 {
                position: absolute;
                left: 10vw;
                top: calc((100vh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.22));
                width: 50vw;
                height: calc(100vw * 3 / 4 * 0.1);
            }

            #home3 {
                position: absolute;
                left: 10vw;
                top: calc((100vh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.34));
                width: 50vw;
                height: calc(100vw * 3 / 4 * 0.1);
            }

            #home4 {
                position: absolute;
                left: 10vw;
                top: calc((100vh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.46));
                width: 50vw;
                height: calc(100vw * 3 / 4 * 0.1);
            }

            #yourPlayer {
                position: absolute;
                left: 70vw;
                top: calc((100vh - (100vw * 3 / 4)) / 2 + (100vw * 3 / 4 * 0.46));
                width: 20vw;
                height: calc(100vw * 3 / 4 * 0.1);
            }
        }
    </style>
    <style src="create.css"></style>
</head>

<body>
    <canvas id="win"></canvas>
    <p id="msg"></p>
    <button id="back"></button>
    <button id="next"></button>
    <div id="home" class="page active">
        <button id="home1">つづきから</button>
        <button id="home2" onclick="changePage('create1')">はじめから</button>
        <button id="home3">設定</button>
        <button id="home4">遊び方</button>
    </div>
    <div id="create1" class="page">
        <input id="player1" type="text" maxlength="6">
        <input id="player2" type="text" maxlength="6">
        <input id="player3" type="text" maxlength="6">
        <input id="player4" type="text" maxlength="6">
    </div>
    <div id="create2" class="page"></div>
    <div id="apr" class="page"></div>
    <script type="module">
        import init, { draw_map } from "./pkg/map.js";
        async function map(center_x, center_y) {
            await init();
            draw_map(center_x, center_y);
        }

        class Player {
            constructor() {
                this.name = '';
            }
        }

        const win = document.getElementById('win');
        const ctx = win.getContext('2d');
        const msg = document.getElementById('msg');
        const back = docuemnt.getElementById('back');
        const next = docuemnt.getElementById('next');
        let player;
        let page = 'home';

        function init() {
            switch (page) {
                case 'home':
                    msg.textContent = "桃太郎電鉄(えんがわ釣り・作)へようこそ";
                    back.addEventListener('click', () => {
                    });
                    next.addEventListener('click', () => {
                    });
                    break;
                case 'create1':
                    msg.textContent = "社長さんの名前とあなたの汽車を設定してください";
                    back.addEventListener('click', () => {
                        changePage('home');
                    });
                    next.addEventListener('click', () => {
                        const player1 = document.getElementById('player1');
                        const player2 = document.getElementById('player2');
                        const player3 = document.getElementById('player3');
                        const player4 = document.getElementById('player4');
                        if(player1.value != "") {
                            player.push(Player(player1.value));
                            if(player2.value != "") {
                                player.push(Player(player2.value));
                                if(player3.value != "") {
                                    player.push(Player(player3.value));
                                    if(player4.value != "") {
                                        player.push(Player(player4.value));
                                    }
                                }
                            }
                            changePage('create2');
                        }
                    });
                    break;
                case 'create2':
                    msg.textContent = "本作の目標はお金を集めることではありません。様々な事象でポイントを集めることです。その事象の中には、総資産が少なくないと発生しないものもあります。まずは100ポイントを目指して頑張ってください";
                    back.addEventListener('click', () => {
                        changePage('create');
                    });
                    next.addEventListener('click', () => {
                        changePage('spr');
                    });
                    break;
            }
        }

        function draw() {
            switch (page) {
                case 'home':
                    break;
                case 'create1':
                    break;
                case 'create2':
                    map(0, 0);
                    break;
            }
        }

        function changePage(pageId) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            page = pageId;
            init();
            draw();
        }

        function preventScroll(e) {
            e.preventDefault();
        }

        function resizeWin() {
            const dpr = window.devicePixelRatio || 1;
            const rect = win.getBoundingClientRect();
            win.width = Math.round(rect.width * dpr);
            win.height = Math.round(rect.height * dpr);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            draw();
        }

        window.addEventListener('load', () => {
            document.addEventListener('touchmove', preventScroll, { passive: false });
            document.addEventListener('wheel', preventScroll, { passive: false });
            changePage('home');
            resizeWin();
        });

        window.addEventListener('resize', () => {
            resizeWin();
        });

    </script>
</body>

</html>
